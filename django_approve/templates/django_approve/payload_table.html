<div class="dja-payload dja-payload--create">
  <h2 class="dja-payload__title">Requested object</h2>
  <table>
    <thead>
      <tr>
        <th>Field</th>
        <th>Requested value</th>
      </tr>
    </thead>
    <tbody>
      {% for name, value in items %}
        <tr>
          <th>{{ name }}</th>
          <td><code>{{ value|default_if_none:"—" }}</code></td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
